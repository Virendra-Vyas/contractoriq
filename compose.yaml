services:
  redis:
    image: redis:7-alpine
    container_name: contractoriq-redis
    restart: unless-stopped
    ports:
      - "6381:6379"
    volumes:
      - redis_data:/data

  api:
    build:
      context: ./src/ContractorIQ.API
      dockerfile: Dockerfile
    container_name: contractoriq-api
    restart: unless-stopped
    env_file:
      - .env
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ConnectionStrings__DefaultConnection=Host=host.docker.internal;Port=5433;Database=contractoriq;Username=contractoriq;Password=contractoriq123
      - Jwt__Secret=${JWT_SECRET}
      - Stripe__SecretKey=${STRIPE_SECRET_KEY}
      - OpenAI__ApiKey=${OPENAI_API_KEY}
    ports:
      - "5100:8080"
    depends_on:
      - redis

  web:
    build:
      context: ./src/ContractorIQ.Web
      dockerfile: Dockerfile
    container_name: contractoriq-web
    restart: unless-stopped
    ports:
      - "3001:80"
    depends_on:
      - api

  scraper:
    build:
      context: ./src/contractoriq-scraper
      dockerfile: Dockerfile
    container_name: contractoriq-scraper
    restart: unless-stopped
    env_file:
      - .env
    environment:
      - API_BASE_URL=http://api:8080
      - API_KEY=${SCRAPER_API_KEY}
    depends_on:
      - api

  agent:
    build:
      context: ./src/contractoriq-agent
      dockerfile: Dockerfile
    container_name: contractoriq-agent
    restart: unless-stopped
    env_file:
      - .env
    environment:
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - API_BASE_URL=http://api:8080
      - API_KEY=${SCRAPER_API_KEY}
    depends_on:
      - api
      - redis

volumes:
  redis_data:
